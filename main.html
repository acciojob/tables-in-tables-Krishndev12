<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <table style="width: 100%; height: 100%">
      <!-- Your code here -->
		  <tr>
    <!-- Top Left: Nested Table 2 -->
    <td style="border: 1px solid black; padding: 10px; width: 50%;">
      <table style="width: 100%; border-collapse: collapse; border: 1px solid black; text-align: center;">
        <tr>
          <th colspan="2" style="border: 1px solid black;">Nested Table 2</th>
        </tr>
        <tr>
          <th style="border: 1px solid black;">Column 1</th>
          <th style="border: 1px solid black;">Column 2</th>
        </tr>
        <tr>
          <td style="border: 1px solid black;">abc</td>
          <td style="border: 1px solid black;">def</td>
        </tr>
      </table>
    </td>

    <!-- Top Right: Nested Table 1 -->
    <td style="border: 1px solid black; padding: 10px; width: 50%;">
      <table style="width: 100%; border-collapse: collapse; border: 1px solid black;">
        <tr>
          <th style="border: 1px solid black; text-align: center;">Nested Table 1</th>
        </tr>
        <tr>
          <td style="border: 1px solid black;">
            <ul>
              <li>List item 1</li>
              <li>List item 2</li>
              <li>List item 3</li>
            </ul>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <!-- Bottom Left: Nested Table 3 -->
    <td style="border: 1px solid black; padding: 10px;">
      <table style="width: 100%; border-collapse: collapse; border: 1px solid black; text-align: center;">
        <tr>
          <th colspan="2" style="border: 1px solid black;">Nested Table 3</th>
        </tr>
        <tr>
          <td style="border: 1px solid black; color: purple; text-decoration: underline;">Nested Table</td>
          <td style="border: 1px solid black;">Demo Continued</td>
        </tr>
      </table>
    </td>

    <!-- Bottom Right: Nested Table 4 -->
    <td style="border: 1px solid black; padding: 10px;">
      <table style="width: 100%; border-collapse: collapse; border: 1px solid black; text-align: center;">
        <tr>
          <th style="border: 1px solid black;">Nested Table 4</th>
        </tr>
        <tr>
          <td style="border: 1px solid black; background-color: black; color: white; font-weight: bold; padding: 5px;">HTML</td>
        </tr>
      </table>
    </td>
  </tr>
    </table>
  </body>
</html>
